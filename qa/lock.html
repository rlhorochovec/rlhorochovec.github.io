<!DOCTYPE html>
<html lang="pt-br">

<head>
   <meta charset="UTF-8">
   <meta http-equiv="X-UA-Compatible" content="IE=edge">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Login</title>

   <!-- Bootstrap 5.3 (CSS & Icons) -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
   <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

   <!-- Open Graph -->
   <meta property="og:title" content="Rafael Horochovec — QA Engineer SR">
   <meta property="og:description" content="HTML simples para execução de testes de interface.">
   <meta property="og:type" content="website">

   <link href="assets/css/login.css" rel="stylesheet">
   <link href="assets/css/custom.css" rel="stylesheet">
</head>

<body class="text-center">
   <main class="form-signin">
      <form>
         <img class="mb-4 img-circle" src="assets/img/xovec.jpeg" alt="" width="120">
         <h1 class="h3 mb-3 fw-normal">Informe sua senha</h1>
         <p class="text-danger"><span id="erro"></span></p>
         <div class="form-floating">
            <input type="text" class="form-control" id="login" placeholder="Login" value="user" disabled>
            <label for="login">Login </label>
         </div>
         <div class="form-floating">
            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
            <label for="senha">Digite sua senha</label>
         </div>
         <button class="w-100 btn btn-lg btn-secondary" type="submit"
            onclick="logar(); return false">Desbloquear</button>
         <p class="mt-5 mb-3 text-muted">Rafael Horochovec &copy; 2026</p>
      </form>
   </main>
   
   <script src="assets/js/login.js"></script>
   <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js"
      integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n"
      crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"
      integrity="sha384-Q6E9RHvbIyZFJoft+2mJbHaEWldlvI9IOYy5n3zV9zzTtmI3UksdQRVvoxMfooAo"
      crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js"
      integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6"
      crossorigin="anonymous"></script>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
      crossorigin="anonymous"></script>
</body>

</html>
